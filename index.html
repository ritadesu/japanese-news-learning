<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="JP学習">
<meta name="theme-color" content="#e8e4df">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>日本語ニュースで学ぼう</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-page:    #ede9e4;
  --bg-card:    #f5f2ee;
  --bg-surface: #eceae6;
  --bg-subtle:  #e4e0db;

  --text-primary:   #4a4540;
  --text-secondary: #7a7470;
  --text-tertiary:  #a09890;

  --border-light:  rgba(120,110,100,0.10);
  --border-medium: rgba(120,110,100,0.18);

  --accent-blue:    #8fa8b8;
  --tab-active-bg:  #4a4540;
  --tab-active-text:#f5f2ee;

  --r1: 8px;
  --r2: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  min-height: 100dvh;
  font-size: 17px;
  padding-bottom: calc(72px + var(--safe-bottom));
}

ruby { ruby-align: center; }
rt { font-size: 0.52em; color: var(--accent-blue); font-weight: 500; }

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-light);
  padding: calc(10px + var(--safe-top)) 12px 0;
}
.topbar-row {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 10px; gap: 8px;
}
.app-title {
  font-size: 14px; font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; flex: 1;
}
.topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  font-size: 12px; padding: 5px 10px; border-radius: 99px;
  border: 1px solid var(--border-medium);
  background: transparent; color: var(--text-secondary);
  cursor: pointer; font-family: inherit; transition: all 0.15s;
  white-space: nowrap;
}
.icon-btn.on {
  background: var(--tab-active-bg);
  color: var(--tab-active-text);
  border-color: var(--tab-active-bg);
}

/* ── Tabs ── */
.tabs-wrap {
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 10px;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; gap: 6px; width: max-content; }
.tab-btn {
  padding: 6px 14px; border-radius: 99px;
  border: 1px solid var(--border-medium);
  background: transparent; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer;
  font-family: inherit; white-space: nowrap; transition: all 0.15s;
}
.tab-btn.active {
  background: var(--tab-active-bg);
  color: var(--tab-active-text);
  border-color: var(--tab-active-bg);
}
.tab-btn:hover:not(.active) { background: var(--bg-subtle); }

/* ── Main ── */
.main { padding: 16px; max-width: 700px; margin: 0 auto; }

/* ── Generate button ── */
.gen-btn {
  width: 100%; padding: 15px;
  border-radius: var(--r2);
  border: 1px solid var(--border-medium);
  background: var(--bg-card);
  font-size: 16px; font-weight: 500;
  color: var(--text-primary);
  cursor: pointer; font-family: inherit;
  margin-bottom: 12px; transition: all 0.15s;
}
.gen-btn:active { transform: scale(0.99); background: var(--bg-subtle); }
.gen-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ── Status bar ── */
.status-bar {
  font-size: 14px; color: var(--text-secondary);
  text-align: center; padding: 10px 12px;
  margin-bottom: 12px; background: var(--bg-surface);
  border-radius: var(--r1); border: 1px solid var(--border-light);
  display: none; line-height: 1.5;
}
.status-bar.visible { display: block; }

/* ── News card ── */
.news-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--r2); margin-bottom: 16px; overflow: hidden;
}
.card-header { padding: 16px 18px 14px; border-bottom: 1px solid var(--border-light); }
.badge-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.badge {
  font-size: 12px; font-weight: 500;
  padding: 4px 12px; border-radius: 99px; white-space: nowrap;
}
.badge-tech       { background: #dde8f0; color: #5a7a90; }
.badge-urban      { background: #e8ead8; color: #6a7a50; }
.badge-realestate { background: #f0e8e0; color: #907060; }
.badge-economy    { background: #e8e0f0; color: #706090; }
.badge-agri       { background: #dceadc; color: #507050; }

.card-title { font-size: 18px; font-weight: 500; line-height: 1.6; color: var(--text-primary); }
.card-meta { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; }
.card-body { padding: 16px 18px; }

.section-lbl {
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-tertiary);
  margin-top: 20px; margin-bottom: 10px;
}
.section-lbl:first-child { margin-top: 0; }

.summary { font-size: 16px; line-height: 1.9; color: var(--text-primary); }
.summary-zh {
  font-size: 15px; line-height: 1.8; color: var(--text-secondary);
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border-light);
}

/* ── Vocab grid ── */
.vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (min-width: 500px) { .vocab-grid { grid-template-columns: repeat(3, 1fr); } }

.vocab-item {
  background: var(--bg-surface); border-radius: var(--r1);
  padding: 12px 14px; border: 1px solid var(--border-light);
}
.vocab-word { font-size: 20px; font-weight: 500; color: var(--text-primary); }
.vocab-meaning { font-size: 14px; color: var(--text-secondary); margin-top: 5px; }
.vocab-ex { font-size: 13px; color: var(--text-tertiary); margin-top: 5px; line-height: 1.7; }

/* ── Grammar ── */
.grammar-item {
  border-left: 2px solid var(--accent-blue);
  padding: 12px 14px; margin-bottom: 10px;
  background: var(--bg-surface);
  border-radius: 0 var(--r1) var(--r1) 0;
}
.grammar-item:last-child { margin-bottom: 0; }
.grammar-pat { font-size: 16px; font-weight: 500; color: var(--text-primary); }
.grammar-meaning { font-size: 14px; color: var(--text-secondary); margin-top: 3px; }
.grammar-ex { font-size: 15px; color: var(--text-primary); margin-top: 8px; line-height: 1.85; }
.grammar-ex-zh { font-size: 14px; color: var(--text-tertiary); margin-top: 3px; }

/* ── Key sentences ── */
.sent-item {
  padding-bottom: 16px; margin-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
}
.sent-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.sent-jp { font-size: 16px; line-height: 1.9; color: var(--text-primary); }
.sent-zh { font-size: 15px; color: var(--text-secondary); margin-top: 5px; line-height: 1.7; }
.sent-note {
  font-size: 13px; color: var(--text-tertiary); margin-top: 6px;
  background: var(--bg-surface); padding: 8px 12px; border-radius: var(--r1);
  line-height: 1.7;
}

/* ── States ── */
.empty-state {
  text-align: center; padding: 4rem 1rem;
  background: var(--bg-card); border-radius: var(--r2);
  border: 1px dashed var(--border-medium);
  color: var(--text-secondary); font-size: 15px;
}
.empty-icon { font-size: 36px; margin-bottom: 14px; }
.date-row { text-align: right; font-size: 13px; color: var(--text-tertiary); margin-bottom: 12px; }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(74,69,64,0.4); z-index: 200;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card);
  border-radius: var(--r2) var(--r2) 0 0;
  padding: 26px 20px calc(26px + var(--safe-bottom));
  width: 100%; max-width: 500px;
}
.modal h3 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text-primary); }
.modal p { font-size: 14px; color: var(--text-secondary); margin-bottom: 18px; line-height: 1.6; }
.modal-field { margin-bottom: 16px; }
.modal-field label { display: block; font-size: 13px; color: var(--text-tertiary); margin-bottom: 6px; }
.modal-field input {
  width: 100%; padding: 11px 14px; border-radius: var(--r1);
  border: 1px solid var(--border-medium);
  background: var(--bg-surface); color: var(--text-primary);
  font-size: 15px; font-family: inherit;
}
.hint { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; line-height: 1.6; }
.modal-btn {
  width: 100%; padding: 14px; border-radius: var(--r1);
  border: none; background: var(--tab-active-bg);
  color: var(--tab-active-text); font-size: 16px; font-weight: 500;
  cursor: pointer; font-family: inherit; margin-bottom: 10px;
}
.modal-cancel {
  width: 100%; padding: 12px; border-radius: var(--r1);
  border: 1px solid var(--border-medium); background: transparent;
  color: var(--text-secondary); font-size: 15px;
  cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <span class="app-title">📰 日本語ニュースで学ぼう</span>
    <div class="topbar-actions">
      <button class="icon-btn" id="notifyBtn" onclick="openModal('notifyModal')">🔔 通知</button>
      <button class="icon-btn" id="settingsBtn" onclick="openModal('settingsModal')">⚙ 設定</button>
    </div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all')">すべて</button>
      <button class="tab-btn" onclick="switchTab('tech')">テクノロジー</button>
      <button class="tab-btn" onclick="switchTab('urban')">都市再開発</button>
      <button class="tab-btn" onclick="switchTab('realestate')">不動産市場</button>
      <button class="tab-btn" onclick="switchTab('economy')">経済</button>
      <button class="tab-btn" onclick="switchTab('agri')">農業</button>
    </div>
  </div>
</div>

<div class="main">
  <button class="gen-btn" id="genBtn" onclick="triggerGenerate()">✦ 今日のニュースを生成する</button>
  <div class="status-bar" id="statusBar"></div>
  <div id="output">
    <div class="empty-state">
      <div class="empty-icon">📰</div>
      <div>ボタンをタップして今日の学習コンテンツを生成してください</div>
    </div>
  </div>
</div>

<!-- Notify Modal -->
<div class="modal-overlay" id="notifyModal" onclick="closeIfOutside(event,'notifyModal')">
  <div class="modal">
    <h3>毎日通知を設定する</h3>
    <p>設定した時刻に学習リマインダーをお知らせします。</p>
    <div class="modal-field">
      <label>通知時刻</label>
      <input type="time" id="notifyTime" value="07:50">
    </div>
    <button class="modal-btn" onclick="saveNotification()">通知を有効にする</button>
    <button class="modal-cancel" onclick="closeModal('notifyModal')">キャンセル</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" onclick="closeIfOutside(event,'settingsModal')">
  <div class="modal">
    <h3>GitHub 設定</h3>
    <p>ボタンで即時生成するために必要です。一度設定すれば保存されます。</p>
    <div class="modal-field">
      <label>GitHub ユーザー名</label>
      <input type="text" id="ghUser" placeholder="例：your-username">
    </div>
    <div class="modal-field">
      <label>Repository 名</label>
      <input type="text" id="ghRepo" placeholder="例：japanese-news-learning">
    </div>
    <div class="modal-field">
      <label>Personal Access Token</label>
      <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
      <div class="hint">Settings → Developer settings → Personal access tokens → Tokens (classic)<br>権限：repo ＋ workflow にチェック</div>
    </div>
    <button class="modal-btn" onclick="saveSettings()">保存する</button>
    <button class="modal-cancel" onclick="closeModal('settingsModal')">キャンセル</button>
  </div>
</div>

<script>
const CATS = ['all','tech','urban','realestate','economy','agri'];
const BADGE = {
  tech:        ['badge-tech',        'テクノロジー'],
  urban:       ['badge-urban',       '都市再開発'],
  realestate:  ['badge-realestate',  '不動産市場'],
  economy:     ['badge-economy',     '経済'],
  agri:        ['badge-agri',        '農業']
};
let currentTab = 'all';
let generatedData = null;
let pollTimer = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    const saved = localStorage.getItem('notifyTime');
    if (saved && Notification.permission === 'granted') {
      const [h, m] = saved.split(':').map(Number);
      if (reg.active) reg.active.postMessage({ type: 'SCHEDULE_DAILY', hour: h, minute: m });
    }
  });
}

window.addEventListener('load', () => {
  const t = localStorage.getItem('notifyTime');
  if (t) {
    document.getElementById('notifyTime').value = t;
    document.getElementById('notifyBtn').classList.add('on');
    document.getElementById('notifyBtn').textContent = '🔔 ' + t;
  }
  const u = localStorage.getItem('ghUser');
  const r = localStorage.getItem('ghRepo');
  const tok = localStorage.getItem('ghToken');
  if (u) document.getElementById('ghUser').value = u;
  if (r) document.getElementById('ghRepo').value = r;
  if (tok) document.getElementById('ghToken').value = tok;
  if (u && r && tok) document.getElementById('settingsBtn').classList.add('on');
  loadExistingNews();
});

async function loadExistingNews() {
  try {
    const res = await fetch('./today.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      generatedData = data;
      renderCards(data);
      document.getElementById('genBtn').textContent = '✦ 再度生成する（最新に更新）';
    }
  } catch(e) {}
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', CATS[i] === tab);
  });
  if (generatedData) renderCards(generatedData);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeIfOutside(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

async function saveNotification() {
  const t = document.getElementById('notifyTime').value;
  if (!('Notification' in window)) { alert('このブラウザは通知をサポートしていません。'); return; }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { alert('通知が許可されませんでした。'); return; }
  localStorage.setItem('notifyTime', t);
  const [h, m] = t.split(':').map(Number);
  const reg = await navigator.serviceWorker.ready;
  if (reg.active) reg.active.postMessage({ type: 'SCHEDULE_DAILY', hour: h, minute: m });
  document.getElementById('notifyBtn').classList.add('on');
  document.getElementById('notifyBtn').textContent = '🔔 ' + t;
  closeModal('notifyModal');
}

function saveSettings() {
  const u = document.getElementById('ghUser').value.trim();
  const r = document.getElementById('ghRepo').value.trim();
  const tok = document.getElementById('ghToken').value.trim();
  if (!u || !r || !tok) { alert('すべての項目を入力してください。'); return; }
  localStorage.setItem('ghUser', u);
  localStorage.setItem('ghRepo', r);
  localStorage.setItem('ghToken', tok);
  document.getElementById('settingsBtn').classList.add('on');
  closeModal('settingsModal');
  showStatus('✅ 設定を保存しました');
  setTimeout(hideStatus, 2500);
}

async function triggerGenerate() {
  const user = localStorage.getItem('ghUser');
  const repo = localStorage.getItem('ghRepo');
  const token = localStorage.getItem('ghToken');
  if (!user || !repo || !token) { openModal('settingsModal'); showStatus('⚙ 先に GitHub 設定を行ってください'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = 'リクエスト送信中...';
  showStatus('🔄 GitHub Actions にリクエストを送信しています...');

  try {
    const res = await fetch('https://api.github.com/repos/' + user + '/' + repo + '/dispatches', {
      method: 'POST',
      headers: {
        'Accept': 'application/vnd.github+json',
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28'
      },
      body: JSON.stringify({ event_type: 'generate-news' })
    });
    if (res.status === 204) {
      btn.textContent = '⏳ 生成中（約2分）...';
      showStatus('✅ リクエスト完了！Gemini がニュースを生成中です...');
      startPolling();
    } else {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || 'GitHub API error (' + res.status + ')');
    }
  } catch(e) {
    showStatus('❌ エラー：' + e.message);
    btn.disabled = false;
    btn.textContent = '✦ 今日のニュースを生成する';
  }
}

function startPolling() {
  let attempts = 0;
  const maxAttempts = 40;
  const prevDate = generatedData?.date;
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    attempts++;
    try {
      const res = await fetch('./today.json?t=' + Date.now());
      if (res.ok) {
        const data = await res.json();
        if (data.date !== prevDate || !prevDate) {
          clearInterval(pollTimer);
          generatedData = data;
          renderCards(data);
          document.getElementById('genBtn').disabled = false;
          document.getElementById('genBtn').textContent = '✦ 再度生成する（最新に更新）';
          showStatus('✅ 今日のニュースが更新されました！');
          setTimeout(hideStatus, 3000);
          return;
        }
      }
    } catch(e) {}
    if (attempts >= maxAttempts) {
      clearInterval(pollTimer);
      document.getElementById('genBtn').disabled = false;
      document.getElementById('genBtn').textContent = '✦ 今日のニュースを生成する';
      showStatus('⏳ まだ生成中です。しばらく後にページを再読み込みしてください。');
    }
  }, 3000);
}

function showStatus(msg) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.classList.add('visible');
}
function hideStatus() { document.getElementById('statusBar').classList.remove('visible'); }

function renderCards(data) {
  const output = document.getElementById('output');
  const articles = (data.articles || []).filter(a => currentTab === 'all' || a.category === currentTab);
  if (!articles.length) {
    output.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>このカテゴリーには記事がありません</div></div>';
    return;
  }
  let html = '<div class="date-row">' + data.date + '</div>';
  for (const a of articles) {
    const [bc, bl] = BADGE[a.category] || ['badge-tech', a.category];
    const vocabHtml = (a.vocabulary||[]).map(v =>
      '<div class="vocab-item">' +
        '<div class="vocab-word">' + v.word + '</div>' +
        '<div class="vocab-meaning">' + v.meaning + '</div>' +
        '<div class="vocab-ex">例：' + v.example + '</div>' +
      '</div>'
    ).join('');
    const gramHtml = (a.grammarPoints||[]).map(g =>
      '<div class="grammar-item">' +
        '<div class="grammar-pat">' + g.pattern + '</div>' +
        '<div class="grammar-meaning">' + g.meaning + '</div>' +
        '<div class="grammar-ex">→ ' + g.example + '</div>' +
        '<div class="grammar-ex-zh">' + g.exampleZh + '</div>' +
      '</div>'
    ).join('');
    const sentHtml = (a.keySentences||[]).map(s =>
      '<div class="sent-item">' +
        '<div class="sent-jp">' + s.jp + '</div>' +
        '<div class="sent-zh">' + s.zh + '</div>' +
        '<div class="sent-note">📌 ' + s.note + '</div>' +
      '</div>'
    ).join('');
    html +=
      '<div class="news-card">' +
        '<div class="card-header">' +
          '<div class="badge-row"><span class="badge ' + bc + '">' + bl + '</span></div>' +
          '<div class="card-title">' + a.titleJp + '</div>' +
          '<div class="card-meta">' + a.titleZh + '・出典：' + a.source + '</div>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="section-lbl">ニュース要約</div>' +
          '<div class="summary">' + a.summaryJp + '</div>' +
          '<div class="summary-zh">' + a.summaryZh + '</div>' +
          '<div class="section-lbl">重要単語</div>' +
          '<div class="vocab-grid">' + vocabHtml + '</div>' +
          '<div class="section-lbl">文法・表現</div>' +
          gramHtml +
          '<div class="section-lbl">キーセンテンス</div>' +
          sentHtml +
        '</div>' +
      '</div>';
  }
  output.innerHTML = html;
}
</script>
</body>
</html>
