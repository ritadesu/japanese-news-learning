<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="JP学習">
<meta name="theme-color" content="#1a1a18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>日本語ニュースで学ぼう</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0: #ffffff; --bg1: #f5f5f3; --bg2: #eeede9;
  --t0: #1a1a18; --t1: #6b6b67; --t2: #9e9e99;
  --b0: rgba(0,0,0,0.07); --b1: rgba(0,0,0,0.13); --b2: rgba(0,0,0,0.22);
  --r1: 8px; --r2: 12px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg0: #1c1c1a; --bg1: #252523; --bg2: #2e2e2b;
    --t0: #f0efeb; --t1: #a0a09a; --t2: #6b6b65;
    --b0: rgba(255,255,255,0.06); --b1: rgba(255,255,255,0.11); --b2: rgba(255,255,255,0.2);
  }
}
body {
  font-family: 'Noto Sans JP','Hiragino Sans',sans-serif;
  background: var(--bg2); color: var(--t0);
  min-height: 100dvh;
  padding-bottom: calc(80px + var(--safe-bottom));
}
ruby { ruby-align: center; }
rt { font-size: 0.55em; color: var(--t1); }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg0); border-bottom: 0.5px solid var(--b0);
  padding: 14px 16px 0;
}
.topbar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.app-title { font-size: 17px; font-weight: 500; }
.topbar-actions { display: flex; gap: 8px; }
.icon-btn {
  font-size: 12px; padding: 5px 12px; border-radius: 99px;
  border: 0.5px solid var(--b1); background: transparent;
  color: var(--t1); cursor: pointer; font-family: inherit; white-space: nowrap;
}
.icon-btn.on { background: var(--t0); color: var(--bg0); border-color: var(--t0); }

.tabs-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 12px; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; gap: 6px; width: max-content; }
.tab-btn {
  padding: 6px 14px; border-radius: 99px;
  border: 0.5px solid var(--b1); background: transparent;
  font-size: 12px; font-weight: 500; color: var(--t1);
  cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 0.15s;
}
.tab-btn.active { background: var(--t0); color: var(--bg0); border-color: var(--t0); }

.main { padding: 16px; max-width: 700px; margin: 0 auto; }

.gen-btn {
  width: 100%; padding: 14px; border-radius: var(--r2);
  border: 0.5px solid var(--b1); background: var(--bg0);
  font-size: 14px; font-weight: 500; color: var(--t0);
  cursor: pointer; font-family: inherit; margin-bottom: 16px; transition: all 0.15s;
}
.gen-btn:active { transform: scale(0.98); }
.gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.status-bar {
  font-size: 12px; color: var(--t2); text-align: center;
  padding: 8px; margin-bottom: 12px; display: none;
  background: var(--bg1); border-radius: var(--r1);
}
.status-bar.visible { display: block; }

.news-card { background: var(--bg0); border: 0.5px solid var(--b0); border-radius: var(--r2); margin-bottom: 14px; overflow: hidden; }
.card-header { padding: 14px 16px 12px; border-bottom: 0.5px solid var(--b0); }
.badge-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
.badge-tech       { background: #E6F1FB; color: #0C447C; }
.badge-urban      { background: #FAEEDA; color: #633806; }
.badge-realestate { background: #EAF3DE; color: #27500A; }
.badge-economy    { background: #EEEDFE; color: #3C3489; }
.badge-agri       { background: #EAF3DE; color: #3B6D11; }
@media (prefers-color-scheme: dark) {
  .badge-tech       { background: #0C2A4A; color: #85B7EB; }
  .badge-urban      { background: #412402; color: #FAC775; }
  .badge-realestate { background: #1A2E0D; color: #97C459; }
  .badge-economy    { background: #26215C; color: #AFA9EC; }
  .badge-agri       { background: #173404; color: #97C459; }
}
.card-title { font-size: 15px; font-weight: 500; line-height: 1.6; }
.card-meta { font-size: 12px; color: var(--t2); margin-top: 4px; }
.card-body { padding: 14px 16px; }
.section-lbl {
  font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--t2);
  margin-top: 16px; margin-bottom: 8px;
}
.section-lbl:first-child { margin-top: 0; }
.summary { font-size: 14px; line-height: 1.9; }
.summary-zh { font-size: 13px; line-height: 1.7; color: var(--t1); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--b0); }

.vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (min-width: 500px) { .vocab-grid { grid-template-columns: repeat(3,1fr); } }
.vocab-item { background: var(--bg1); border-radius: var(--r1); padding: 10px 12px; border: 0.5px solid var(--b0); }
.vocab-word { font-size: 16px; font-weight: 500; }
.vocab-meaning { font-size: 12px; color: var(--t1); margin-top: 4px; }
.vocab-ex { font-size: 11px; color: var(--t2); margin-top: 4px; line-height: 1.6; }

.grammar-item { border-left: 2px solid var(--b2); padding: 9px 12px; margin-bottom: 8px; background: var(--bg1); border-radius: 0 var(--r1) var(--r1) 0; }
.grammar-item:last-child { margin-bottom: 0; }
.grammar-pat { font-size: 14px; font-weight: 500; }
.grammar-meaning { font-size: 12px; color: var(--t1); margin-top: 2px; }
.grammar-ex { font-size: 13px; margin-top: 6px; line-height: 1.8; }
.grammar-ex-zh { font-size: 12px; color: var(--t2); margin-top: 2px; }

.sent-item { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 0.5px solid var(--b0); }
.sent-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.sent-jp { font-size: 14px; line-height: 1.9; }
.sent-zh { font-size: 13px; color: var(--t1); margin-top: 4px; }
.sent-note { font-size: 12px; color: var(--t2); margin-top: 5px; background: var(--bg1); padding: 6px 10px; border-radius: var(--r1); }

.empty-state, .loading-state {
  text-align: center; padding: 4rem 1rem;
  background: var(--bg0); border-radius: var(--r2);
  border: 0.5px dashed var(--b1); color: var(--t1); font-size: 14px;
}
.empty-icon { font-size: 32px; margin-bottom: 12px; }
.spinner { width: 22px; height: 22px; border: 2px solid var(--b1); border-top-color: var(--t1); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-state { padding: 16px; background: var(--bg0); border: 0.5px solid var(--b0); border-radius: var(--r2); color: var(--t1); font-size: 13px; line-height: 1.6; }
.date-row { text-align: right; font-size: 12px; color: var(--t2); margin-bottom: 10px; }

/* Modals */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg0); border-radius: var(--r2) var(--r2) 0 0; padding: 24px 20px calc(24px + var(--safe-bottom)); width: 100%; max-width: 500px; }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--t1); margin-bottom: 16px; line-height: 1.6; }
.modal-field { margin-bottom: 16px; }
.modal-field label { display: block; font-size: 12px; color: var(--t2); margin-bottom: 6px; }
.modal-field input {
  width: 100%; padding: 10px 12px; border-radius: var(--r1);
  border: 0.5px solid var(--b1); background: var(--bg1);
  color: var(--t0); font-size: 14px; font-family: inherit;
}
.modal-btn { width: 100%; padding: 13px; border-radius: var(--r1); border: none; background: var(--t0); color: var(--bg0); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-bottom: 8px; }
.modal-cancel { width: 100%; padding: 11px; border-radius: var(--r1); border: 0.5px solid var(--b1); background: transparent; color: var(--t1); font-size: 14px; cursor: pointer; font-family: inherit; }
.hint { font-size: 11px; color: var(--t2); margin-top: 4px; line-height: 1.5; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <span class="app-title">日本語ニュースで学ぼう</span>
    <div class="topbar-actions">
      <button class="icon-btn" id="notifyBtn" onclick="openModal('notifyModal')">🔔 通知</button>
      <button class="icon-btn" id="settingsBtn" onclick="openModal('settingsModal')">⚙ 設定</button>
    </div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all')">すべて</button>
      <button class="tab-btn" onclick="switchTab('tech')">💻 科技</button>
      <button class="tab-btn" onclick="switchTab('urban')">🏗 都市更新</button>
      <button class="tab-btn" onclick="switchTab('realestate')">🏢 不動産市場</button>
      <button class="tab-btn" onclick="switchTab('economy')">📈 経済</button>
      <button class="tab-btn" onclick="switchTab('agri')">🌾 農業</button>
    </div>
  </div>
</div>

<div class="main">
  <button class="gen-btn" id="genBtn" onclick="triggerGenerate()">✦ 今日のニュースを生成する</button>
  <div class="status-bar" id="statusBar"></div>
  <div id="output">
    <div class="empty-state">
      <div class="empty-icon">📰</div>
      <div>ボタンをタップして今日の学習コンテンツを生成してください</div>
    </div>
  </div>
</div>

<!-- Notify Modal -->
<div class="modal-overlay" id="notifyModal" onclick="closeIfOutside(event,'notifyModal')">
  <div class="modal">
    <h3>毎日通知を設定する</h3>
    <p>設定した時刻に学習リマインダーをお知らせします。</p>
    <div class="modal-field">
      <label>通知時刻</label>
      <input type="time" id="notifyTime" value="08:00">
    </div>
    <button class="modal-btn" onclick="saveNotification()">通知を有効にする</button>
    <button class="modal-cancel" onclick="closeModal('notifyModal')">キャンセル</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" onclick="closeIfOutside(event,'settingsModal')">
  <div class="modal">
    <h3>GitHub 設定</h3>
    <p>ボタンで即時生成するために必要です。一度設定すれば保存されます。</p>
    <div class="modal-field">
      <label>GitHub ユーザー名</label>
      <input type="text" id="ghUser" placeholder="例：your-username">
    </div>
    <div class="modal-field">
      <label>Repository 名</label>
      <input type="text" id="ghRepo" placeholder="例：japanese-news-learning">
    </div>
    <div class="modal-field">
      <label>GitHub Personal Access Token（PAT）</label>
      <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
      <div class="hint">Settings → Developer settings → Personal access tokens → Fine-grained tokens<br>権限：Actions: Read & Write</div>
    </div>
    <button class="modal-btn" onclick="saveSettings()">保存する</button>
    <button class="modal-cancel" onclick="closeModal('settingsModal')">キャンセル</button>
  </div>
</div>

<script>
const CATS = ['all','tech','urban','realestate','economy','agri'];
const BADGE = {
  tech:        ['badge-tech',        '💻 科技'],
  urban:       ['badge-urban',       '🏗 都市更新'],
  realestate:  ['badge-realestate',  '🏢 不動産市場'],
  economy:     ['badge-economy',     '📈 経済'],
  agri:        ['badge-agri',        '🌾 農業']
};
let currentTab = 'all';
let generatedData = null;
let pollTimer = null;

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    const saved = localStorage.getItem('notifyTime');
    if (saved && Notification.permission === 'granted') {
      const [h, m] = saved.split(':').map(Number);
      if (reg.active) reg.active.postMessage({ type: 'SCHEDULE_DAILY', hour: h, minute: m });
    }
  });
}

// Load settings on start
window.addEventListener('load', () => {
  const t = localStorage.getItem('notifyTime');
  if (t) {
    document.getElementById('notifyTime').value = t;
    document.getElementById('notifyBtn').classList.add('on');
    document.getElementById('notifyBtn').textContent = '🔔 ' + t;
  }
  const u = localStorage.getItem('ghUser');
  const r = localStorage.getItem('ghRepo');
  const tok = localStorage.getItem('ghToken');
  if (u) document.getElementById('ghUser').value = u;
  if (r) document.getElementById('ghRepo').value = r;
  if (tok) document.getElementById('ghToken').value = tok;
  if (u && r) document.getElementById('settingsBtn').classList.add('on');

  // Try to load today's existing JSON
  loadExistingNews();
});

async function loadExistingNews() {
  try {
    const res = await fetch('today.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      generatedData = data;
      renderCards(data);
      document.getElementById('genBtn').textContent = '✦ 再度生成する（最新に更新）';
    }
  } catch(e) { /* no json yet, that's fine */ }
}

// Tab switching
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', CATS[i] === tab);
  });
  if (generatedData) renderCards(generatedData);
}

// Modals
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeIfOutside(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

// Notification
async function saveNotification() {
  const t = document.getElementById('notifyTime').value;
  if (!('Notification' in window)) { alert('このブラウザは通知をサポートしていません。'); return; }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { alert('通知が許可されませんでした。設定から許可してください。'); return; }
  localStorage.setItem('notifyTime', t);
  const [h, m] = t.split(':').map(Number);
  const reg = await navigator.serviceWorker.ready;
  if (reg.active) reg.active.postMessage({ type: 'SCHEDULE_DAILY', hour: h, minute: m });
  document.getElementById('notifyBtn').classList.add('on');
  document.getElementById('notifyBtn').textContent = '🔔 ' + t;
  closeModal('notifyModal');
}

// GitHub Settings
function saveSettings() {
  const u = document.getElementById('ghUser').value.trim();
  const r = document.getElementById('ghRepo').value.trim();
  const tok = document.getElementById('ghToken').value.trim();
  if (!u || !r || !tok) { alert('すべての項目を入力してください。'); return; }
  localStorage.setItem('ghUser', u);
  localStorage.setItem('ghRepo', r);
  localStorage.setItem('ghToken', tok);
  document.getElementById('settingsBtn').classList.add('on');
  closeModal('settingsModal');
  showStatus('✅ 設定を保存しました');
}

// Trigger GitHub Actions
async function triggerGenerate() {
  const user = localStorage.getItem('ghUser');
  const repo = localStorage.getItem('ghRepo');
  const token = localStorage.getItem('ghToken');

  if (!user || !repo || !token) {
    openModal('settingsModal');
    showStatus('⚙ 先に GitHub 設定を行ってください');
    return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '生成をリクエスト中...';
  showStatus('🔄 GitHub Actions にリクエストを送信しています...');

  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/dispatches`, {
      method: 'POST',
      headers: {
        'Accept': 'application/vnd.github+json',
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ event_type: 'generate-news' })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'GitHub API error');
    }

    btn.textContent = '⏳ 生成中（約30秒）...';
    showStatus('✅ リクエスト完了！GitHub Actions が実行中です。自動的に更新されます...');
    startPolling();

  } catch(e) {
    showStatus('❌ エラー：' + e.message);
    btn.disabled = false;
    btn.textContent = '✦ 今日のニュースを生成する';
  }
}

// Poll for new today.json after triggering
function startPolling() {
  let attempts = 0;
  const maxAttempts = 20; // 約60秒
  const currentDate = generatedData?.date;

  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    attempts++;
    try {
      const res = await fetch('today.json?t=' + Date.now());
      if (res.ok) {
        const data = await res.json();
        // Check if it's actually new content
        if (data.date !== currentDate || !currentDate) {
          clearInterval(pollTimer);
          generatedData = data;
          renderCards(data);
          document.getElementById('genBtn').disabled = false;
          document.getElementById('genBtn').textContent = '✦ 再度生成する（最新に更新）';
          showStatus('✅ 今日のニュースが更新されました！');
          setTimeout(() => hideStatus(), 3000);
          return;
        }
      }
    } catch(e) {}

    if (attempts >= maxAttempts) {
      clearInterval(pollTimer);
      document.getElementById('genBtn').disabled = false;
      document.getElementById('genBtn').textContent = '✦ 今日のニュースを生成する';
      showStatus('⏳ まだ生成中です。しばらく後にページを再読み込みしてください。');
    }
  }, 3000);
}

function showStatus(msg) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.classList.add('visible');
}
function hideStatus() {
  document.getElementById('statusBar').classList.remove('visible');
}

// Render
function renderCards(data) {
  const output = document.getElementById('output');
  const articles = data.articles.filter(a => currentTab === 'all' || a.category === currentTab);
  if (!articles.length) {
    output.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>このカテゴリーには記事がありません</div></div>';
    return;
  }
  let html = '<div class="date-row">' + data.date + '</div>';
  for (const a of articles) {
    const [bc, bl] = BADGE[a.category] || ['badge-tech', a.category];
    const vocabHtml = (a.vocabulary||[]).map(v =>
      '<div class="vocab-item"><div class="vocab-word">' + v.word + '</div><div class="vocab-meaning">' + v.meaning + '</div><div class="vocab-ex">例：' + v.example + '</div></div>'
    ).join('');
    const gramHtml = (a.grammarPoints||[]).map(g =>
      '<div class="grammar-item"><div class="grammar-pat">' + g.pattern + '</div><div class="grammar-meaning">' + g.meaning + '</div><div class="grammar-ex">→ ' + g.example + '</div><div class="grammar-ex-zh">' + g.exampleZh + '</div></div>'
    ).join('');
    const sentHtml = (a.keySentences||[]).map(s =>
      '<div class="sent-item"><div class="sent-jp">' + s.jp + '</div><div class="sent-zh">' + s.zh + '</div><div class="sent-note">📌 ' + s.note + '</div></div>'
    ).join('');
    html += '<div class="news-card"><div class="card-header"><div class="badge-row"><span class="badge ' + bc + '">' + bl + '</span></div><div class="card-title">' + a.titleJp + '</div><div class="card-meta">' + a.titleZh + '・出典：' + a.source + '</div></div><div class="card-body"><div class="section-lbl">ニュース要約</div><div class="summary">' + a.summaryJp + '</div><div class="summary-zh">' + a.summaryZh + '</div><div class="section-lbl">重要単語（5語）</div><div class="vocab-grid">' + vocabHtml + '</div><div class="section-lbl">文法・表現ポイント</div>' + gramHtml + '<div class="section-lbl">キーセンテンス解説</div>' + sentHtml + '</div></div>';
  }
  output.innerHTML = html;
}
</script>
</body>
</html>
