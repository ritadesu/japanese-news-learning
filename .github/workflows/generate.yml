name: Generate Daily News

on:
  schedule:
    - cron: '0 0 * * *'
  repository_dispatch:
    types: [generate-news]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate news with Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - << 'EOF'
          import os, json, urllib.request, datetime, re

          api_key = os.environ["GEMINI_API_KEY"]
          today = datetime.datetime.now(
              datetime.timezone(datetime.timedelta(hours=8))
          ).strftime("%Y年%m月%d日")

          prompt = (
              "あなたは日本語教育の専門家です。今日（" + today + "）の日本の最新ニュースを基に、"
              "台湾人学習者向けのN2レベルの学習コンテンツを作成してください。"
              "すべての漢字にrubyタグで読み仮名を付けてください。"
              "例：<ruby>東京<rt>とうきょう</rt></ruby>\n\n"
              "重要：JSONの文字列値の中に改行を含めないでください。すべての値は1行で書いてください。\n\n"
              "以下のJSON形式のみで回答してください。JSONのみ出力し、コードブロックや他のテキストは含めないでください：\n"
              '{"date":"' + today + '","articles":['
              '{"category":"tech","titleJp":"rubyタグ付き見出し","titleZh":"中文","summaryJp":"rubyタグ付き要約（改行なし）","summaryZh":"中文摘要","source":"メディア名",'
              '"vocabulary":[{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文意思","example":"例文"},{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文意思","example":"例文"},{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文意思","example":"例文"},{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文意思","example":"例文"},{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文意思","example":"例文"}],'
              '"grammarPoints":[{"pattern":"〜パターン","meaning":"中文說明","example":"例文","exampleZh":"翻譯"},{"pattern":"〜パターン","meaning":"中文說明","example":"例文","exampleZh":"翻譯"},{"pattern":"〜パターン","meaning":"中文說明","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]},'
              '{"category":"urban","titleJp":"見出し","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア",'
              '"vocabulary":[{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"}],'
              '"grammarPoints":[{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]},'
              '{"category":"realestate","titleJp":"見出し","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア",'
              '"vocabulary":[{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"}],'
              '"grammarPoints":[{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]},'
              '{"category":"economy","titleJp":"見出し","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア",'
              '"vocabulary":[{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"}],'
              '"grammarPoints":[{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]},'
              '{"category":"agri","titleJp":"見出し","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア",'
              '"vocabulary":[{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"},{"word":"単語","meaning":"中文","example":"例文"}],'
              '"grammarPoints":[{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]}'
              ']}'
          )

          payload = json.dumps({
              "contents": [{"parts": [{"text": prompt}], "role": "user"}],
              "tools": [{"google_search": {}}],
              "generationConfig": {
                  "maxOutputTokens": 8192,
                  "temperature": 0.3
              }
          }).encode("utf-8")

          url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + api_key
          req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})

          with urllib.request.urlopen(req, timeout=180) as res:
              data = json.loads(res.read())

          print("API response received")

          # Extract all text parts
          text = ""
          for part in data["candidates"][0]["content"]["parts"]:
              if "text" in part:
                  text += part["text"]

          text = text.strip()
          print("Raw text length:", len(text))

          # Clean markdown code blocks
          text = re.sub(r'```[a-z]*', '', text)
          text = text.replace('```', '').strip()

          # Find JSON boundaries
          start = text.index("{")
          end = text.rindex("}") + 1
          json_str = text[start:end]

          # Fix control characters inside JSON string values
          # Replace literal newlines inside strings with space
          def fix_json_string(s):
              result = []
              in_string = False
              escape = False
              for ch in s:
                  if escape:
                      result.append(ch)
                      escape = False
                  elif ch == '\\':
                      result.append(ch)
                      escape = True
                  elif ch == '"':
                      result.append(ch)
                      in_string = not in_string
                  elif in_string and ch in ('\n', '\r', '\t'):
                      result.append(' ')
                  elif in_string and ord(ch) < 32:
                      # skip other control characters
                      pass
                  else:
                      result.append(ch)
              return ''.join(result)

          json_str = fix_json_string(json_str)

          parsed = json.loads(json_str)

          with open("today.json", "w", encoding="utf-8") as f:
              json.dump(parsed, f, ensure_ascii=False, indent=2)

          print("Done: " + str(len(parsed["articles"])) + " articles for " + today)
          EOF

      - name: Commit and push today.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add today.json
          git diff --staged --quiet || git commit -m "Daily news $(date +'%Y-%m-%d')"
          git push
