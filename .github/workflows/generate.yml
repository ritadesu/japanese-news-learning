name: Generate Daily News

on:
  schedule:
    - cron: '50 23 * * *'
  repository_dispatch:
    types: [generate-news]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate news with Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - << 'EOF'
          import os, json, urllib.request, datetime, re

          api_key = os.environ["GEMINI_API_KEY"]
          today = datetime.datetime.now(
              datetime.timezone(datetime.timedelta(hours=8))
          ).strftime("%Y年%m月%d日")

          prompt = (
              "あなたは日本語教育の専門家です。今日（" + today + "）の日本の最新ニュースを基に、"
              "台湾人学習者向けのN2レベルの学習コンテンツを5カテゴリ分作成してください。\n\n"
              "【重要】JSONの文字列の中にHTMLタグ・改行・特殊文字を含めないでください。プレーンテキストのみ使用してください。\n"
              "漢字の読み方は「word_reading」フィールドに別途記載してください。\n\n"
              "JSONのみ出力してください（コードブロック・説明文不要）：\n"
              '{"date":"' + today + '","articles":['
              '{"category":"tech","titleJp":"テクノロジーニュース見出し","titleZh":"中文翻譯","summaryJp":"3文の要約。漢字の後ろに括弧で読みを入れてください。例：東京（とうきょう）","summaryZh":"中文摘要","source":"メディア名",'
              '"vocabulary":[{"word":"単語","reading":"読み方","meaning":"中文意思","example":"例文（読み付き）"},{"word":"単語","reading":"読み方","meaning":"中文意思","example":"例文"},{"word":"単語","reading":"読み方","meaning":"中文意思","example":"例文"},{"word":"単語","reading":"読み方","meaning":"中文意思","example":"例文"},{"word":"単語","reading":"読み方","meaning":"中文意思","example":"例文"}],'
              '"grammarPoints":[{"pattern":"パターン","meaning":"中文說明","example":"例文（読み付き）","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文說明","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文說明","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文（読み付き）","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]},'
              '{"category":"urban","titleJp":"都市更新ニュース","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア",'
              '"vocabulary":[{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"}],'
              '"grammarPoints":[{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]},'
              '{"category":"realestate","titleJp":"不動産ニュース","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア",'
              '"vocabulary":[{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"}],'
              '"grammarPoints":[{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]},'
              '{"category":"economy","titleJp":"経済ニュース","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア",'
              '"vocabulary":[{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"}],'
              '"grammarPoints":[{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]},'
              '{"category":"agri","titleJp":"農業ニュース","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア",'
              '"vocabulary":[{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"},{"word":"単語","reading":"読み","meaning":"中文","example":"例文"}],'
              '"grammarPoints":[{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"},{"pattern":"パターン","meaning":"中文","example":"例文","exampleZh":"翻譯"}],'
              '"keySentences":[{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"},{"jp":"文","zh":"翻譯","note":"解説"}]}'
              ']}'
          )

          payload = json.dumps({
              "contents": [{"parts": [{"text": prompt}], "role": "user"}],
              "tools": [{"google_search": {}}],
              "generationConfig": {
                  "maxOutputTokens": 8192,
                  "temperature": 0.3
              }
          }).encode("utf-8")

          url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + api_key
          req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})

          with urllib.request.urlopen(req, timeout=180) as res:
              data = json.loads(res.read())

          print("API response received")

          text = ""
          for part in data["candidates"][0]["content"]["parts"]:
              if "text" in part:
                  text += part["text"]

          text = text.strip()
          print("Raw text length:", len(text))

          # Clean markdown
          text = re.sub(r'```[a-z]*', '', text)
          text = text.replace('```', '').strip()

          # Find JSON
          start = text.index("{")
          end = text.rindex("}") + 1
          json_str = text[start:end]

          # Replace literal newlines/tabs inside strings with space
          cleaned = []
          in_str = False
          esc = False
          for ch in json_str:
              if esc:
                  cleaned.append(ch)
                  esc = False
              elif ch == '\\':
                  cleaned.append(ch)
                  esc = True
              elif ch == '"':
                  cleaned.append(ch)
                  in_str = not in_str
              elif in_str and ord(ch) < 32:
                  cleaned.append(' ')
              else:
                  cleaned.append(ch)
          json_str = ''.join(cleaned)

          parsed = json.loads(json_str)

          # Add ruby tags from reading field
          for article in parsed.get("articles", []):
              for v in article.get("vocabulary", []):
                  if v.get("word") and v.get("reading"):
                      v["word"] = "<ruby>" + v["word"] + "<rt>" + v["reading"] + "</rt></ruby>"

          with open("today.json", "w", encoding="utf-8") as f:
              json.dump(parsed, f, ensure_ascii=False, indent=2)

          print("Done: " + str(len(parsed["articles"])) + " articles for " + today)
          EOF

      - name: Commit and push today.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add today.json
          git diff --staged --quiet || git commit -m "Daily news $(date +'%Y-%m-%d')"
          git push
