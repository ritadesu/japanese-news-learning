name: Generate Daily News

on:
  # 每天早上 8:00 台灣時間（UTC+8 = UTC 00:00）自動執行
  schedule:
    - cron: '0 0 * * *'

  # 允許從前端按鈕觸發
  repository_dispatch:
    types: [generate-news]

  # 允許在 GitHub 網頁上手動觸發
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate news with Anthropic API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat << 'PYEOF' > generate.py
          import os, json, urllib.request, urllib.error, datetime

          api_key = os.environ["ANTHROPIC_API_KEY"]
          today = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8))).strftime("%Y年%m月%d日")

          prompt = f"""あなたは日本語教育の専門家です。今日（{today}）の日本の最新ニュースを基に、台湾人学習者向けのN2〜N1・ビジネス日本語レベルの学習コンテンツを作成してください。

【重要ルール】すべての漢字にHTMLのrubyタグで読み仮名を付けてください。例：<ruby>東京<rt>とうきょう</rt></ruby>

以下のJSON形式のみで回答してください（前置き不要、コードブロック不要）：
{{"date":"{today}","articles":[{{"category":"tech","titleJp":"rubyタグ付き見出し","titleZh":"中文","summaryJp":"rubyタグ付き3〜4文要約","summaryZh":"中文摘要","source":"メディア名","vocabulary":[{{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文","example":"rubyタグ付き例文"}},{{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文","example":"rubyタグ付き例文"}},{{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文","example":"rubyタグ付き例文"}},{{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文","example":"rubyタグ付き例文"}},{{"word":"<ruby>単語<rt>読み</rt></ruby>","meaning":"中文","example":"rubyタグ付き例文"}}],"grammarPoints":[{{"pattern":"〜パターン","meaning":"中文說明","example":"rubyタグ付き例文","exampleZh":"翻譯"}},{{"pattern":"〜パターン","meaning":"中文說明","example":"rubyタグ付き例文","exampleZh":"翻譯"}},{{"pattern":"〜パターン","meaning":"中文說明","example":"rubyタグ付き例文","exampleZh":"翻譯"}}],"keySentences":[{{"jp":"rubyタグ付きセンテンス","zh":"翻譯","note":"解說"}},{{"jp":"rubyタグ付きセンテンス","zh":"翻譯","note":"解說"}},{{"jp":"rubyタグ付きセンテンス","zh":"翻譯","note":"解說"}}]}},{{"category":"urban","titleJp":"都市更新見出し","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア","vocabulary":[{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}}],"grammarPoints":[{{"pattern":"","meaning":"","example":"","exampleZh":""}},{{"pattern":"","meaning":"","example":"","exampleZh":""}},{{"pattern":"","meaning":"","example":"","exampleZh":""}}],"keySentences":[{{"jp":"","zh":"","note":""}},{{"jp":"","zh":"","note":""}},{{"jp":"","zh":"","note":""}}]}},{{"category":"realestate","titleJp":"不動産市場見出し","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア","vocabulary":[{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}}],"grammarPoints":[{{"pattern":"","meaning":"","example":"","exampleZh":""}},{{"pattern":"","meaning":"","example":"","exampleZh":""}},{{"pattern":"","meaning":"","example":"","exampleZh":""}}],"keySentences":[{{"jp":"","zh":"","note":""}},{{"jp":"","zh":"","note":""}},{{"jp":"","zh":"","note":""}}]}},{{"category":"economy","titleJp":"経済見出し","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア","vocabulary":[{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}}],"grammarPoints":[{{"pattern":"","meaning":"","example":"","exampleZh":""}},{{"pattern":"","meaning":"","example":"","exampleZh":""}},{{"pattern":"","meaning":"","example":"","exampleZh":""}}],"keySentences":[{{"jp":"","zh":"","note":""}},{{"jp":"","zh":"","note":""}},{{"jp":"","zh":"","note":""}}]}},{{"category":"agri","titleJp":"農業見出し","titleZh":"中文","summaryJp":"要約","summaryZh":"中文","source":"メディア","vocabulary":[{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}},{{"word":"","meaning":"","example":""}}],"grammarPoints":[{{"pattern":"","meaning":"","example":"","exampleZh":""}},{{"pattern":"","meaning":"","example":"","exampleZh":""}},{{"pattern":"","meaning":"","example":"","exampleZh":""}}],"keySentences":[{{"jp":"","zh":"","note":""}},{{"jp":"","zh":"","note":""}},{{"jp":"","zh":"","note":""}}]}}]}}

上記JSONのすべてのフィールドを実際のコンテンツで埋め、漢字にはrubyタグで読み仮名を付けてください。"""

          payload = json.dumps({
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 6000,
              "tools": [{"type": "web_search_20250305", "name": "web_search"}],
              "messages": [{"role": "user", "content": prompt}]
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01"
              }
          )

          try:
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
          except urllib.error.HTTPError as e:
              print("API Error:", e.read().decode())
              raise

          text_block = next((b for b in data["content"] if b["type"] == "text"), None)
          if not text_block:
              raise Exception("No text in response")

          raw = text_block["text"].strip()
          start = raw.index("{")
          end = raw.rindex("}") + 1
          parsed = json.loads(raw[start:end])

          with open("today.json", "w", encoding="utf-8") as f:
              json.dump(parsed, f, ensure_ascii=False, indent=2)

          print(f"✅ Generated {len(parsed['articles'])} articles for {today}")
          PYEOF
          python3 generate.py

      - name: Commit and push today.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add today.json
          git diff --staged --quiet || git commit -m "📰 Daily news $(date +'%Y-%m-%d')"
          git push
